<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ejemplo Básico</title>
    <link rel="stylesheet" href="../styles/styles.css" />
  </head>
  <body>
    <div class="tarjeta">
      <h1>Bienvenido</h1>
      <p>Este es un ejemplo simple de página HTML con estilo y JavaScript.</p>
      <button id="miBoton">Haz clic aquí</button>
      <p id="resultado"></p>

      <p>
        <a class="boton-enlace" href="formulario.html">Ir al formulario</a>
      </p>
    </div>

    <div class="tarjeta">
      <h1>Bienvenido</h1>
      <p>Este es un ejemplo simple de página HTML con estilo y JavaScript.</p>
      <button type="button">Haz clic aquí</button>
      <p></p>
    </div>

    <script>
      const boton = document.getElementById("miBoton");
      const resultado = document.getElementById("resultado");

      boton.addEventListener("click", () => {
        const fecha = new Date();
        resultado.textContent =
          "¡Has hecho clic! Hora actual: " + fecha.toLocaleTimeString();
      });
    </script>
  </body>
</html>
